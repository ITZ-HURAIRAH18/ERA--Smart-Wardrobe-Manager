{% extends 'base.html' %}
{% load static %}
{% block title %}ERA - Add Category{% endblock %}
{% block content %}
<div class="admin-form-page" style="padding-top: 120px; min-height: 80vh;">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 style="font-family: var(--font-heading);">Add <span class="text-gold">Category</span></h1>
            <a href="{% url 'list_categories' %}" class="btn-era-outline"><i class="bi bi-arrow-left me-1"></i>Back</a>
        </div>
        <form method="POST" enctype="multipart/form-data" style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-card); padding: 2rem;">
            {% csrf_token %}
            <div class="mb-3"><label class="form-era-label">Name</label>{{ form.name }}</div>
            <div class="mb-3"><label class="form-era-label">Slug</label>{{ form.slug }}</div>
            <div class="mb-3"><label class="form-era-label">Description</label>{{ form.description }}</div>
            <div class="mb-3"><label class="form-era-label">Image</label>{{ form.image }}</div>
            <button type="submit" class="btn-era btn-era-lg w-100"><i class="bi bi-check-circle me-2"></i>Save Category</button>
        </form>
    </div>
</div>
{% endblock %}
