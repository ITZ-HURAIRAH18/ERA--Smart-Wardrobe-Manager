{% extends 'base.html' %}
{% load static %}

{% block title %}ERA - Login{% endblock %}

{% block content %}
<style>
    body { overflow-y: auto !important; min-height: 100vh; }
    .login-container { min-height: 100vh; overflow: visible; }

    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding: 120px 0 60px;
    }

    .login-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-card);
        padding: 3rem;
        max-width: 480px;
        width: 100%;
        margin: 0 auto;
    }

    .login-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }

    .login-header h1 {
        font-family: var(--font-heading);
        font-size: 2.5rem;
        font-style: italic;
        background: var(--gold-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.5rem;
    }

    .login-header p {
        color: var(--text-secondary);
        font-size: 0.95rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--text-secondary);
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }

    .form-group input {
        width: 100%;
    }

    .btn-login {
        width: 100%;
        margin-top: 1rem;
    }

    .login-footer {
        text-align: center;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-light);
    }

    .login-footer a {
        color: var(--gold-primary);
        font-weight: 500;
    }

    .login-footer a:hover {
        color: var(--gold-light);
    }

    .divider {
        display: flex;
        align-items: center;
        margin: 1.5rem 0;
        color: var(--text-muted);
        font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border-light);
    }

    .divider span {
        padding: 0 1rem;
    }

    .error-message {
        background: rgba(155, 35, 53, 0.1);
        border: 1px solid var(--danger);
        color: var(--danger);
        padding: 0.75rem 1rem;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
    }
</style>

<div class="login-page">
    <div class="container">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>ERA</h1>
                    <p>Welcome back! Sign in to continue</p>
                </div>

                {% if error %}
                <div class="error-message">
                    <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
                </div>
                {% endif %}

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-era"
                               placeholder="your@email.com" required
                               value="{{ values.email|default:'' }}">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-era"
                               placeholder="Enter your password" required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label" for="rememberMe" style="color: var(--text-secondary); font-size: 0.9rem;">
                                Remember me
                            </label>
                        </div>
                        <a href="#" style="font-size: 0.9rem;">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-era btn-login">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>

                <div class="divider">
                    <span>or</span>
                </div>

                <div class="login-footer">
                    <p class="mb-0" style="color: var(--text-secondary);">
                        Don't have an account?
                        <a href="{% url 'register' %}">Create one now</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
